[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "gemscanner"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["numpy", "opencv-python", "trimesh", "pytest"]

[tool.setuptools.packages.find]
include = ["gemscanner*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
